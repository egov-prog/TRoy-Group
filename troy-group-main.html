<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRoy Group™ — Corporate Homepage</title>
  <meta name="description" content="TRoy Group™ is a multi-division organisation operating in maritime, travel, trading, media, innovation and automation.">
  <style>
    :root {
      --primary: #003b95;
      --primary-light: #0059d6;
      --bg: #f5f7fb;
      --text: #1a1a1a;
      --muted: #6b7280;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    /* UNIFIED NAV BAR */
    .troy-nav {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .troy-nav-inner {
      max-width: 1200px;
      margin: auto;
      padding: 0.9rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .troy-brand-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .troy-brand-logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .troy-brand-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .troy-menu {
      display: flex;
      gap: 1.4rem;
    }
    .troy-menu a {
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    .troy-menu a:hover {
      color: var(--primary-light);
    }
    @media (max-width: 700px) {
      .troy-nav-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }
      .troy-menu {
        flex-wrap: wrap;
        gap: 0.8rem;
      }
    }

    /* HERO */
    .hero {
      background: #fff;
      padding: 4rem 1.5rem;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 4vw, 3rem);
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--primary);
    }
    .hero p {
      max-width: 700px;
      margin: auto;
      color: var(--muted);
      font-size: 1.05rem;
    }

    /* DIVISION GRID */
    .section {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .tile {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem;
      border: 1px solid #e5e7eb;
      text-align: center;
      transition: 0.2s ease;
    }

      transform: translateY(-4px);
      border-color: var(--primary-light);
      box-shadow: 0 6px 16px rgba
