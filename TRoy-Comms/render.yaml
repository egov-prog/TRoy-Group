services:
  - type: web
    name: troytel-signaling
    runtime: node
    rootDir: TRoy-Comms
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3500
      # Add the rest manually in Render dashboard from .env.example
    healthCheckPath: /health
    plan: free   # 750 hrs/month, sleeps after 15min idle
