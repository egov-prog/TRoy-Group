; ‚îÄ‚îÄ‚îÄ Free SIP Trunk (sip2sip.info) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
; Sign up FREE at: https://www.sip2sip.info/
; Provides a SIP URI (you@sip2sip.info) for external calls

[sip2sip-trunk]
type=peer
username=YOUR_SIP2SIP_USERNAME
fromuser=YOUR_SIP2SIP_USERNAME
secret=YOUR_SIP2SIP_PASSWORD
host=sip2sip.info
qualify=yes
nat=force_rport
dtmfmode=rfc2833
allow=ulaw,alaw
insecure=port,invite
context=troy-internal
