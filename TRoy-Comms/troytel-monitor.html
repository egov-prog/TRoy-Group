<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRoyTel Monitor">
<meta name="theme-color" content="#03070f">
<title>TRoyTel™ Room Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ──────────────────────────────────── */
:root {
  --bg0:    #03070f;
  --bg1:    #070e1c;
  --bg2:    #0c1628;
  --bg3:    #111e35;
  --border: #162440;
  --cyan:   #00d4e8;
  --green:  #2ecc71;
  --amber:  #f59e0b;
  --purple: #a855f7;
  --orange: #f97316;
  --red:    #ef4444;
  --text:   #c8d8f0;
  --dim:    #4a6080;
  --mono:   'Share Tech Mono', monospace;
  --head:   'Rajdhani', sans-serif;
  --body:   'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--text);
  font-family: var(--body);
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ─── NOISE OVERLAY ───────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

/* ─── HEADER ──────────────────────────────────── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  background: linear-gradient(180deg, var(--bg1) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.logo {
  font-family: var(--head);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.logo-troy { color: var(--cyan); }
.logo-rest { color: var(--text); }
.logo-tm   { color: var(--dim); font-size: 11px; vertical-align: super; }

.header-status {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}
.pulse-ring {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(46,204,113,.6);
  animation: pulse-ring 2s infinite;
}
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(46,204,113,.6); }
  70%  { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
}

.header-time {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--dim);
}

/* ─── MAIN GRID ───────────────────────────────── */
.main {
  position: fixed;
  top: 56px; bottom: 60px;
  left: 0; right: 0;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  align-content: start;
  z-index: 2;
}

/* ─── ROOM CARD ───────────────────────────────── */
.room-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 18px 14px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s;
  cursor: pointer;
}
.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--c, var(--cyan));
  opacity: .5;
  transition: opacity .3s;
}
.room-card:hover { border-color: var(--c, var(--cyan)); }
.room-card:hover::before { opacity: 1; }

/* ─── RINGING STATE ───────────────────────────── */
.room-card.ringing {
  border-color: var(--c, var(--cyan)) !important;
  box-shadow: 0 0 0 2px var(--c, var(--cyan)), 0 0 40px var(--c, var(--cyan))33 !important;
  animation: card-ring 1s infinite;
}
@keyframes card-ring {
  0%,100% { box-shadow: 0 0 0 2px var(--c, var(--cyan)), 0 0 40px var(--c, var(--cyan))33; }
  50%     { box-shadow: 0 0 0 4px var(--c, var(--cyan)), 0 0 60px var(--c, var(--cyan))55; }
}

/* ─── ROOM CARD INTERNALS ─────────────────────── */
.room-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
  margin-bottom: 12px;
}

.room-emoji {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}

.room-info { flex: 1; min-width: 0; }

.room-name {
  font-family: var(--head);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: .5px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.room-ext {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
}

/* ─── STATUS BADGE ────────────────────────────── */
.room-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: var(--mono);
  flex-shrink: 0;
  transition: all .3s;
}
.status-waiting {
  background: rgba(74,96,128,.15);
  border: 1px solid var(--border);
  color: var(--dim);
}
.status-active {
  background: rgba(46,204,113,.1);
  border: 1px solid rgba(46,204,113,.3);
  color: var(--green);
}
.status-ringing {
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.4);
  color: var(--red);
  animation: blink-badge .6s infinite;
}
@keyframes blink-badge { 0%,100%{opacity:1} 50%{opacity:.4} }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-active .status-dot { animation: pulse-ring 2s infinite; }

/* ─── PARTICIPANT COUNT ───────────────────────── */
.room-participants {
  font-size: 13px;
  color: var(--dim);
  margin-bottom: 14px;
  font-family: var(--mono);
}
.room-participants span {
  color: var(--c, var(--cyan));
  font-size: 20px;
  font-weight: 700;
  font-family: var(--head);
  vertical-align: middle;
  margin-right: 4px;
}

/* ─── ROOM ACTIONS ────────────────────────────── */
.room-actions {
  display: flex; gap: 8px;
}

.btn-join {
  flex: 1;
  padding: 9px 14px;
  border-radius: 7px;
  border: none;
  font-family: var(--head);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .5px;
  cursor: pointer;
  background: var(--c, var(--cyan));
  color: var(--bg0);
  transition: all .2s;
}
.btn-join:hover { filter: brightness(1.15); transform: translateY(-1px); }

.btn-open {
  padding: 9px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.btn-open:hover { border-color: var(--c, var(--cyan)); color: var(--c, var(--cyan)); }

/* ─── JITSI MODAL ─────────────────────────────── */
.jitsi-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 1000;
  flex-direction: column;
}
.jitsi-modal.open { display: flex; }

.jitsi-modal-bar {
  height: 52px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  flex-shrink: 0;
}

.jitsi-modal-title {
  font-family: var(--head);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.btn-close-modal {
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3);
  color: var(--red);
  padding: 6px 16px;
  border-radius: 6px;
  font-family: var(--head);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: .5px;
}
.btn-close-modal:hover { background: rgba(239,68,68,.2); }

.jitsi-modal iframe {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
}

/* ─── FOOTER BAR ──────────────────────────────── */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  z-index: 100;
}

.footer-stat {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}
.footer-stat-val {
  font-size: 14px;
  font-family: var(--head);
  font-weight: 600;
  color: var(--cyan);
}

.footer-sep { flex: 1; }

.btn-mute-all {
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
}
.btn-mute-all:hover { border-color: var(--amber); color: var(--amber); }

.monitor-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  display: flex; align-items: center; gap: 6px;
}

/* ─── ALERT TOAST ─────────────────────────────── */
.alert-toast {
  position: fixed;
  top: 70px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg1);
  border-radius: 12px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 14px;
  z-index: 2000;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  border: 1px solid var(--border);
}
.alert-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
.alert-toast-icon { font-size: 22px; flex-shrink: 0; }
.alert-toast-text { flex: 1; min-width: 0; }
.alert-toast-name { font-family: var(--head); font-size: 15px; font-weight: 600; }
.alert-toast-sub  { font-size: 12px; color: var(--dim); margin-top: 1px; }
.alert-toast-btn {
  padding: 7px 16px;
  border-radius: 6px;
  border: none;
  font-family: var(--head);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

/* ─── INSTALL BANNER ──────────────────────────── */
.install-banner {
  position: fixed;
  bottom: 68px; left: 16px; right: 16px;
  background: var(--bg2);
  border: 1px solid var(--cyan)44;
  border-radius: 10px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px;
  z-index: 200;
  transition: all .3s;
}
.install-banner.hidden { display: none; }
.install-banner-text { flex: 1; color: var(--dim); }
.install-banner-text strong { color: var(--text); }
.btn-install {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--cyan);
  background: transparent;
  color: var(--cyan);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-dismiss {
  background: none; border: none;
  color: var(--dim); font-size: 18px;
  cursor: pointer; padding: 0 4px;
}

/* ─── HIDDEN JITSI MONITORS ───────────────────── */
#monitors { display: none; }
</style>
</head>
<body>

<!-- ─── HEADER ───────────────────────────────── -->
<header class="header">
  <div class="logo">
    <span class="logo-troy">TRoy</span><span class="logo-rest">Tel</span><span class="logo-tm">™</span>
  </div>
  <div class="header-status">
    <div class="pulse-ring" id="monitorDot"></div>
    <span id="monitorLabel">Monitoring 6 rooms</span>
  </div>
  <div class="header-time" id="clock">--:--:--</div>
</header>

<!-- ─── ROOM CARDS ────────────────────────────── -->
<main class="main" id="roomGrid"></main>

<!-- ─── FOOTER ───────────────────────────────── -->
<footer class="footer-bar">
  <div class="footer-stat">
    <span>ACTIVE</span>
    <span class="footer-stat-val" id="statActive">0</span>
  </div>
  <div class="footer-stat">
    <span>WAITING</span>
    <span class="footer-stat-val" id="statWaiting">6</span>
  </div>
  <div class="footer-stat">
    <span>TOTAL CALLERS</span>
    <span class="footer-stat-val" id="statTotal">0</span>
  </div>
  <div class="footer-sep"></div>
  <div class="monitor-label">
    <span class="pulse-ring" style="width:7px;height:7px"></span>
    TROYTEL™ LIVE
  </div>
</footer>

<!-- ─── JITSI CALL MODAL ──────────────────────── -->
<div class="jitsi-modal" id="callModal">
  <div class="jitsi-modal-bar">
    <span class="jitsi-modal-title" id="callModalTitle">📞 Room</span>
    <button class="btn-close-modal" onclick="closeCall()">📵 End / Back</button>
  </div>
  <iframe id="callFrame" src="" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>
</div>

<!-- ─── ALERT TOAST ───────────────────────────── -->
<div class="alert-toast" id="alertToast">
  <div class="alert-toast-icon" id="alertIcon">📞</div>
  <div class="alert-toast-text">
    <div class="alert-toast-name" id="alertName">Incoming call</div>
    <div class="alert-toast-sub"  id="alertSub">Someone joined</div>
  </div>
  <button class="alert-toast-btn" id="alertBtn" onclick="answerAlert()">Answer</button>
</div>

<!-- ─── INSTALL BANNER ────────────────────────── -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <strong>Install TRoyTel™ Monitor</strong> — add to home screen for always-on monitoring
  </div>
  <button class="btn-install" id="btnInstall" onclick="installPWA()">Install</button>
  <button class="btn-dismiss" onclick="document.getElementById('installBanner').classList.add('hidden')">✕</button>
</div>

<!-- ─── HIDDEN MONITOR IFRAMES ───────────────── -->
<div id="monitors"></div>

<script>
// ─── ROOM CONFIG ─────────────────────────────────
const ROOMS = [
  { key:'maritime', emoji:'🚢', name:'TRoy Maritime Agency™', ext:'Ext. 100',
    jitsi:'TRoyMaritime-OpsRoom',   color:'#00d4e8', email:'troymaritimeagency@gmail.com' },
  { key:'travel',   emoji:'✈️',  name:'TRoyGo™ Travel',       ext:'Ext. 200',
    jitsi:'TRoyGo-TravelTeam',      color:'#2ecc71', email:'troytravelagency@gmail.com' },
  { key:'trading',  emoji:'📦', name:'TRoy Trading Agency™',  ext:'Ext. 300',
    jitsi:'TRoyTrading-Partners',   color:'#f59e0b', email:'troytradingagency@gmail.com' },
  { key:'media',    emoji:'🎬', name:'TRoyMEDIA™',            ext:'Ext. 400',
    jitsi:'TRoyMEDIA-Studio',       color:'#a855f7', email:'troymadiagency@gmail.com' },
  { key:'garage',   emoji:'🔬', name:'TRoy GAR™ Lab',         ext:'Ext. 401',
    jitsi:'TRoyGAR-Lab',            color:'#f97316', email:'thetroygarage@gmail.com' },
  { key:'group',    emoji:'🌐', name:'TRoy Group™ HQ',        ext:'Ext. 001',
    jitsi:'TRoyGroup-AllHands',     color:'#00d4e8', email:'groupoftroy@gmail.com' },
];

// ─── STATE ───────────────────────────────────────
const state = {};
ROOMS.forEach(r => {
  state[r.key] = { participants: 0, status: 'waiting', api: null };
});

let alertQueue   = [];
let alertActive  = null;
let alertTimeout = null;
let deferredPrompt = null;
let totalCalls   = 0;

// ─── CLOCK ───────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',
    timeZone:'Australia/Darwin'}) + ' ACST';
}
setInterval(updateClock, 1000);
updateClock();

// ─── BUILD CARDS ─────────────────────────────────
function buildCards() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  ROOMS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.id = `card_${r.key}`;
    card.style.setProperty('--c', r.color);
    card.innerHTML = `
      <div class="room-header">
        <div class="room-emoji">${r.emoji}</div>
        <div class="room-info">
          <div class="room-name">${r.name}</div>
          <div class="room-ext">${r.ext} &nbsp;·&nbsp; ${r.jitsi}</div>
        </div>
        <div class="room-status status-waiting" id="status_${r.key}">
          <span class="status-dot"></span>
          <span id="statuslabel_${r.key}">Waiting</span>
        </div>
      </div>
      <div class="room-participants">
        <span id="count_${r.key}">0</span> participant(s) in room
      </div>
      <div class="room-actions">
        <button class="btn-join" style="background:${r.color}" onclick="openCall('${r.key}')">
          📞 Join Room
        </button>
        <button class="btn-open" onclick="window.open('https://meet.jit.si/${r.jitsi}','_blank')" title="Open in new tab">
          ↗
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

// ─── UPDATE CARD STATE ───────────────────────────
function updateCard(key, count) {
  const prev = state[key].participants;
  state[key].participants = count;

  const countEl  = document.getElementById(`count_${key}`);
  const statusEl = document.getElementById(`status_${key}`);
  const labelEl  = document.getElementById(`statuslabel_${key}`);
  const card     = document.getElementById(`card_${key}`);

  if (countEl) countEl.textContent = count;

  if (count === 0) {
    state[key].status = 'waiting';
    statusEl.className = 'room-status status-waiting';
    labelEl.textContent = 'Waiting';
    card.classList.remove('ringing');
  } else {
    state[key].status = 'active';
    statusEl.className = 'room-status status-active';
    labelEl.textContent = count + ' active';
    card.classList.remove('ringing');
  }

  // Trigger alert if someone NEW joined
  if (count > prev && prev === 0) {
    triggerAlert(key, count);
  }

  updateFooter();
}

// ─── FOOTER STATS ────────────────────────────────
function updateFooter() {
  let active = 0, waiting = 0;
  ROOMS.forEach(r => {
    if (state[r.key].participants > 0) active++;
    else waiting++;
  });
  document.getElementById('statActive').textContent  = active;
  document.getElementById('statWaiting').textContent = waiting;
  document.getElementById('statTotal').textContent   = totalCalls;
}

// ─── ALERT SYSTEM ────────────────────────────────
function triggerAlert(key, count) {
  totalCalls++;
  const room = ROOMS.find(r => r.key === key);
  if (!room) return;

  // Visual: card ring
  const card = document.getElementById(`card_${key}`);
  const statusEl = document.getElementById(`status_${key}`);
  const labelEl  = document.getElementById(`statuslabel_${key}`);
  card.classList.add('ringing');
  statusEl.className = 'room-status status-ringing';
  labelEl.textContent = '📞 INCOMING';

  // Audio alert
  playBeep(room.color);

  // Show toast
  alertActive = key;
  const toast  = document.getElementById('alertToast');
  toast.style.borderColor = room.color + '88';
  document.getElementById('alertIcon').textContent  = room.emoji;
  document.getElementById('alertName').textContent  = 'Incoming — ' + room.name;
  document.getElementById('alertSub').textContent   = count + ' caller(s) waiting · Tap Answer to connect';
  const btn = document.getElementById('alertBtn');
  btn.style.background = room.color;
  btn.style.color = '#03070f';
  toast.classList.add('show');

  // Notification API
  if (Notification.permission === 'granted') {
    new Notification('📞 TRoyTel™ — Incoming Call', {
      body: room.name + ' — ' + count + ' caller(s) waiting',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📞</text></svg>',
      tag: 'troytel-call',
      renotify: true,
    });
  }

  // Auto-dismiss after 30s
  clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 30000);
}

function answerAlert() {
  document.getElementById('alertToast').classList.remove('show');
  if (alertActive) openCall(alertActive);
}

// ─── BEEP ─────────────────────────────────────────
function playBeep(color) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = [880, 660, 880];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + 0.12);
      osc.start(t); osc.stop(t + 0.15);
    });
  } catch(e) {}
}

// ─── OPEN CALL MODAL ─────────────────────────────
function openCall(key) {
  const room = ROOMS.find(r => r.key === key);
  if (!room) return;
  document.getElementById('alertToast').classList.remove('show');
  document.getElementById(`card_${key}`).classList.remove('ringing');

  const url = `https://meet.jit.si/${room.jitsi}`
    + `#config.startWithVideoMuted=false`
    + `&config.startWithAudioMuted=false`
    + `&config.prejoinPageEnabled=false`
    + `&config.disableDeepLinking=true`
    + `&userInfo.displayName=TRoy%20Agent`
    + `&interfaceConfig.SHOW_JITSI_WATERMARK=false`
    + `&interfaceConfig.APP_NAME=TRoyTel`;

  document.getElementById('callFrame').src = url;
  document.getElementById('callModalTitle').textContent =
    room.emoji + ' ' + room.name + ' — ' + room.jitsi;
  document.getElementById('callModal').classList.add('open');
}

function closeCall() {
  document.getElementById('callModal').classList.remove('open');
  // Reset iframe src to stop stream
  setTimeout(() => {
    document.getElementById('callFrame').src = '';
  }, 300);
}

// ─── JITSI IFRAME API MONITORING ─────────────────
// We use the Jitsi IFrame API in hidden iframes to monitor
// participant counts in each room without audio/video.
function startMonitoring() {
  const script = document.createElement('script');
  script.src = 'https://meet.jit.si/external_api.js';
  script.onload = () => {
    ROOMS.forEach(r => initRoomMonitor(r));
  };
  script.onerror = () => {
    // Fallback: poll via fetch if API fails
    ROOMS.forEach(r => pollRoom(r));
  };
  document.head.appendChild(script);
}

function initRoomMonitor(room) {
  try {
    const container = document.createElement('div');
    container.id = `monitor_${room.key}`;
    container.style.cssText = 'width:1px;height:1px;overflow:hidden;position:absolute;left:-9999px;top:-9999px';
    document.getElementById('monitors').appendChild(container);

    const api = new window.JitsiMeetExternalAPI('meet.jit.si', {
      roomName: room.jitsi,
      parentNode: container,
      width: 1, height: 1,
      configOverwrite: {
        startWithAudioMuted: true,
        startWithVideoMuted: true,
        prejoinPageEnabled: false,
        disableDeepLinking: true,
        enableWelcomePage: false,
      },
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        filmStripOnly: true,
      },
      userInfo: { displayName: 'TRoyTel-Monitor', email: 'monitor@troy.internal' },
    });

    state[room.key].api = api;

    api.addEventListener('participantJoined', () => {
      const count = api.getNumberOfParticipants();
      updateCard(room.key, count);
    });

    api.addEventListener('participantLeft', () => {
      const count = Math.max(0, api.getNumberOfParticipants() - 1);
      updateCard(room.key, count);
    });

    api.addEventListener('videoConferenceJoined', () => {
      // Monitor itself joined — count is 1 (just monitor), so show 0 callers
      updateCard(room.key, 0);
    });

    // Periodic sync
    setInterval(() => {
      try {
        const n = Math.max(0, api.getNumberOfParticipants() - 1); // subtract monitor itself
        if (n !== state[room.key].participants) updateCard(room.key, n);
      } catch(e) {}
    }, 5000);

  } catch(err) {
    console.warn(`Monitor failed for ${room.key}:`, err);
    pollRoom(room);
  }
}

// ─── FALLBACK POLL (if IFrame API blocked) ────────
function pollRoom(room) {
  // When IFrame API is unavailable, we show status cards
  // and rely on manual join. Set all to "watching" state.
  updateCard(room.key, 0);
}

// ─── NOTIFICATIONS PERMISSION ────────────────────
function requestNotifications() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ─── PWA INSTALL ─────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hidden');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.add('hidden');
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.add('hidden');
});

// ─── VISIBILITY API — re-check on tab focus ───────
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    ROOMS.forEach(r => {
      if (state[r.key].api) {
        try {
          const n = Math.max(0, state[r.key].api.getNumberOfParticipants() - 1);
          updateCard(r.key, n);
        } catch(e) {}
      }
    });
  }
});

// ─── KEEP SCREEN AWAKE ───────────────────────────
async function keepAwake() {
  if ('wakeLock' in navigator) {
    try {
      await navigator.wakeLock.request('screen');
    } catch(e) {}
  }
}
// Re-request on visibility change
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) keepAwake();
});

// ─── INIT ─────────────────────────────────────────
buildCards();
updateFooter();
requestNotifications();
keepAwake();
startMonitoring();
</script>
