version: '3.8'

# ============================================================
#  TRoyTel™ — Docker Compose Full Stack
#  TRoy Group™ Communications Engine
#
#  Services:
#    - troytel-server   : WebRTC signaling (Node.js)
#    - asterisk         : SIP/VoIP PBX
#    - matrix-synapse   : Team messaging
#    - nginx            : Reverse proxy + SSL
#
#  Start: docker compose up -d
#  Stop:  docker compose down
# ============================================================

services:

  # ─── TRoyTel™ Signaling Server ──────────────────────────
  troytel-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: troytel-server
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
    env_file:
      - ../.env
    volumes:
      - ../engine:/app/engine
      - ../client:/app/client
    networks:
      - troytel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3500/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Asterisk SIP PBX ───────────────────────────────────
  asterisk:
    image: andrius/asterisk:latest
    container_name: troytel-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"   # SIP
      - "5060:5060/tcp"   # SIP TCP
      - "5061:5061/tcp"   # SIP TLS
      - "10000-10100:10000-10100/udp"  # RTP media
    volumes:
      - ../sip/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ../sip/sip.conf:/etc/asterisk/sip.conf:ro
      - ../sip/voicemail.conf:/etc/asterisk/voicemail.conf:ro
      - asterisk-data:/var/lib/asterisk
    networks:
      - troytel-net

  # ─── Matrix / Synapse ───────────────────────────────────
  matrix-synapse:
    image: matrixdotorg/synapse:latest
    container_name: troytel-matrix
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ./synapse-data:/data
    environment:
      - SYNAPSE_SERVER_NAME=troy.local
      - SYNAPSE_REPORT_STATS=no
    networks:
      - troytel-net

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: troytel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - troytel-server
    networks:
      - troytel-net

# ─── Volumes ──────────────────────────────────────────────
volumes:
  asterisk-data:
  synapse-data:

# ─── Network ──────────────────────────────────────────────
networks:
  troytel-net:
    driver: bridge
