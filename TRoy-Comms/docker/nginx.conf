# TRoyTel™ — Nginx Reverse Proxy Config
# Handles WebSocket upgrade for Socket.io

upstream troytel {
    server troytel-server:3500;
}

server {
    listen 80;
    server_name troytel.troygroup.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name troytel.troygroup.com;

    ssl_certificate     /etc/nginx/ssl/troytel.crt;
    ssl_certificate_key /etc/nginx/ssl/troytel.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WebRTC requires HTTPS (for getUserMedia)
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://troytel;
        proxy_http_version 1.1;
        # WebSocket support (required for Socket.io)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://troytel/health;
    }
}

# Matrix Synapse
server {
    listen 8448 ssl http2;
    server_name matrix.troygroup.com;

    ssl_certificate     /etc/nginx/ssl/troytel.crt;
    ssl_certificate_key /etc/nginx/ssl/troytel.key;

    location / {
        proxy_pass         http://matrix-synapse:8008;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
