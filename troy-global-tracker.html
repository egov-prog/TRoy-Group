<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troy Maritime Agency — Global Vessel Tracking Hub</title>

<!-- Leaflet (Light Ocean Map) -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060a12;
  --surface:  #0b1220;
  --panel:    #0f1929;
  --border:   #162030;
  --border2:  #1e3050;
  --accent:   #00d4ff;
  --green:    #00ff9d;
  --amber:    #ffb800;
  --red:      #ff4560;
  --purple:   #b070ff;
  --text:     #b8ccd8;
  --dim:      #4a6a80;
  --white:    #e0f0ff;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Barlow', sans-serif;
  --display:  'Bebas Neue', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

/* scan-line effect */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
}

/* TOP BAR */
#topbar {
  flex-shrink: 0;
  height: 56px;
  background: linear-gradient(90deg, #040810 0%, #080f1c 100%);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-anchor {
  font-size: 26px;
  filter: drop-shadow(0 0 8px var(--accent));
  animation: anchorGlow 3s ease-in-out infinite;
}
@keyframes anchorGlow {
  0%,100% { filter: drop-shadow(0 0 6px var(--accent)); }
  50%      { filter: drop-shadow(0 0 14px var(--accent)); }
}

.logo-name {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--white);
  line-height: 1;
}
.logo-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 2px;
  margin-top: 2px;
}

.topbar-sep { width: 1px; height: 32px; background: var(--border2); flex-shrink: 0; }

/* Global stats row */
.global-stats {
  display: flex;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
}
.gstat {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 12px;
  border-right: 1px solid var(--border);
  min-width: 70px;
}
.gstat-num {
  font-family: var(--display);
  font-size: 20px;
  line-height: 1;
}
.gstat-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.c-cyan   { color: var(--accent); }
.c-green  { color: var(--green); }
.c-amber  { color: var(--amber); }
.c-red    { color: var(--red); }
.c-purple { color: var(--purple); }

/* Live badge + clock */
.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,255,157,0.07);
  border: 1px solid rgba(0,255,157,0.25);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--green);
  letter-spacing: 1.5px;
}
.blink {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.2s infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

.utc-clock {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 1px;
}

/* REGION TABS */
#regionbar {
  flex-shrink: 0;
  height: 36px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 99;
}
#regionbar::-webkit-scrollbar { display: none; }

.rtab {
  padding: 0 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rtab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.rtab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0,212,255,0.04); }

/* BODY: LEFT PANEL + MAP */
#body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* LEFT PANEL */
#left {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-head-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}
.badge-count {
  background: rgba(0,212,255,0.12);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 10px;
  padding: 1px 9px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
}

/* Location list */
#locList {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.loc-group-label {
  padding: 8px 14px 4px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 5;
}

.loc-item {
  padding: 9px 14px;
  border-bottom: 1px solid rgba(22,32,48,0.6);
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.loc-item:hover { background: rgba(0,212,255,0.04); }
.loc-item.active {
  background: rgba(0,212,255,0.08);
  border-left: 2px solid var(--accent);
}

.loc-icon { font-size: 16px; flex-shrink: 0; }

.loc-info { flex: 1; min-width: 0; }
.loc-name {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--white);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.loc-sub {
  font-size: 10px;
  color: var(--dim);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.loc-traffic {
  text-align: right;
  flex-shrink: 0;
}
.loc-daily {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
}
.loc-daily-label {
  font-size: 9px;
  color: var(--dim);
}

/* MAP AREA */
#mapArea {
  flex: 1;
  position: relative;
  background: #080e18;
  overflow: hidden;
}

/* Leaflet map container */
#leafletMap {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* Map HUD overlays */
.hud-topleft {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.hud-card {
  background: rgba(6,10,18,0.88);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 14px;
  pointer-events: auto;
}

.hud-title {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--white);
  line-height: 1;
}
.hud-coords {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  margin-top: 3px;
  letter-spacing: 0.5px;
}
.hud-importance {
  margin-top: 6px;
  font-size: 10px;
  color: var(--text);
  line-height: 1.4;
  max-width: 260px;
}

.hud-topright {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.mini-stat {
  background: rgba(6,10,18,0.88);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 14px;
  text-align: center;
  min-width: 84px;
}
.mini-num {
  font-family: var(--display);
  font-size: 24px;
  line-height: 1;
}
.mini-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Bottom detail bar */
#detailBar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  background: rgba(6,10,18,0.94);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border2);
  padding: 10px 16px;
  display: flex;
  gap: 24px;
  align-items: center;
}

.detail-col { flex: 1; min-width: 0; }
.detail-col label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 3px;
}
.detail-col .val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* CONTACT FLOAT */
.contact-float {
  position: absolute;
  bottom: 58px;
  right: 12px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cf-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 6px;
  border: 1px solid;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s;
  white-space: nowrap;
}
.cf-wa {
  background: rgba(37,211,102,0.1);
  border-color: rgba(37,211,102,0.35);
  color: #25d366;
}
.cf-wa:hover { background: rgba(37,211,102,0.2); }
.cf-mail {
  background: rgba(0,212,255,0.08);
  border-color: rgba(0,212,255,0.3);
  color: var(--accent);
}
.cf-mail:hover { background: rgba(0,212,255,0.15); }
.cf-pda {
  background: rgba(255,184,0,0.08);
  border-color: rgba(255,184,0,0.3);
  color: var(--amber);
}
.cf-pda:hover { background: rgba(255,184,0,0.15); }

/* TICKER */
#ticker {
  flex-shrink: 0;
  height: 30px;
  background: rgba(0,212,255,0.04);
  border-top: 1px solid var(--border2);
  overflow: hidden;
  display: flex;
  align-items: center;
  z-index: 100;
}
.tick-inner {
  display: flex;
  animation: scroll 60s linear infinite;
  white-space: nowrap;
}
.tick-item {
  padding: 0 28px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  border-right: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 30px;
}
.tick-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
@keyframes scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">
    <div class="logo-anchor">⚓</div>
    <div>
      <div class="logo-name">TROY MARITIME AGENCY</div>
      <div class="logo-tag">GLOBAL VESSEL TRACKING HUB · DARWIN, AUSTRALIA · 24/7</div>
    </div>
  </div>

  <div class="topbar-sep"></div>

  <div class="global-stats">
    <div class="gstat"><span class="gstat-num c-cyan" id="gTotal">99,400+</span><span class="gstat-label">Vessels Tracked</span></div>
    <div class="gstat"><span class="gstat-num c-amber">20</span><span class="gstat-label">Straits / Canals</span></div>
    <div class="gstat"><span class="gstat-num c-green">38</span><span class="gstat-label">Major Ports</span></div>
    <div class="gstat"><span class="gstat-num c-red">500+</span><span class="gstat-label">Dover / Day</span></div>
    <div class="gstat"><span class="gstat-num c-purple">96,000+</span><span class="gstat-label">Malacca / Year</span></div>
    <div class="gstat"><span class="gstat-num c-cyan">20,000+</span><span class="gstat-label">Hormuz / Year</span></div>
    <div class="gstat"><span class="gstat-num c-amber">14,000+</span><span class="gstat-label">Panama / Year</span></div>
    <div class="gstat"><span class="gstat-num c-green">20,600+</span><span class="gstat-label">
