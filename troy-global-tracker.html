<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRoyMAR™ Global Vessel Tracker</title>

    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #tracker-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="tracker-container"></div>

    <!-- MarineTraffic Embed Configuration -->
    <script type="text/javascript">
        width = "100%";
        height = "100%";
        border = "0";
        shownames = "true";
        latitude = "25.0";
        longitude = "-12.1";
        zoom = "4";
        maptype = "0"; 
        trackvessel = "0";
        fleet = ""; // If you have a MarineTraffic fleet, put your registered email here
    </script>

    <!-- MarineTraffic Embed Script -->
    <script type="text/javascript" src="https://www.marinetraffic.com/js/embed.js"></script>
</body>
</html>
