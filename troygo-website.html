<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRoyGO™ Trip Planner</title>

<style>
:root{
  --primary:#003b95;
  --accent:#febb02;
  --bg:#f5f7fb;
  --text:#1b1b1b;
  --muted:#6b7280;
  --radius:10px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:1rem 1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:800;
  font-size:1.1rem;
  color:var(--primary);
}

main{
  max-width:1100px;
  margin:2rem auto;
  padding:0 1.5rem;
}

.hero{
  background:var(--primary);
  color:#fff;
  padding:2.5rem;
  border-radius:var(--radius);
}

.hero h1{
  font-size:2rem;
  margin-bottom:.4rem;
}

.hero p{
  opacity:.9;
}

.trip-box{
  background:#fff;
  border-radius:var(--radius);
  margin-top:1.5rem;
  padding:1.2rem;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.trip-box-title{
  font-weight:700;
  color:var(--primary);
  margin-bottom:.6rem;
}

.trip-input-row{
  display:flex;
  gap:.6rem;
}

.trip-input-row input{
  flex:1;
  padding:.7rem .9rem;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:.9rem;
}

.trip-input-row button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:.7rem 1.4rem;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.trip-results{
  margin-top:1rem;
  font-size:.9rem;
}

/* TripAdvisor-style cards */
.day{
  margin-top:1rem;
  border-top:1px solid #e5e7eb;
  padding-top:.8rem;
}

.day-title{
  font-weight:700;
  margin-bottom:.4rem;
}

.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:.6rem;
  margin-top:.45rem;
  background:#fff;
}

.card-title{
  font-weight:600;
  font-size:.85rem;
}

.card-sub{
  font-size:.78rem;
  color:var(--muted);
}

.card button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:.35rem .7rem;
  border-radius:6px;
  font-size:.75rem;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:2rem 1.5rem;
  font-size:.8rem;
  color:var(--muted);
