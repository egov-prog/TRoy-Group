<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRoyGo™ / TRoy Travel Agency™</title>
  <meta name="description" content="TRoyGo™ / TRoy Travel Agency™ offers smart trip planning, stays, flights, car rentals, cruises and more.">
  <style>
    :root {
      --primary: #003b95;
      --primary-light: #0059d6;
      --accent: #febb02;
      --bg: #f5f5f5;
      --text: #1b1b1b;
      --muted: #6b7280;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { text-decoration: none; color: inherit; }

    /* UNIFIED TRoy Group™ NAV BAR */
    .troy-nav {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .troy-nav-inner {
      max-width: 1200px;
      margin: auto;
      padding: 0.9rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .troy-brand-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .troy-brand-logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .troy-brand-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .troy-menu {
      display: flex;
      gap: 1.4rem;
    }
    .troy-menu a {
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    .troy-menu a:hover {
      color: var(--primary-light);
    }
    @media (max-width: 700px) {
      .troy-nav-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }
      .troy-menu {
        flex-wrap: wrap;
        gap: 0.8rem;
      }
    }

    /* HERO */
    .hero {
      background: var(--primary);
      color: #fff;
      padding: 2.5rem 1.5rem 3rem;
    }
    .hero-inner {
      max-width: 1120px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 3vw, 2.4rem);
      margin-bottom: 0.4rem;
    }
    .hero p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* SEARCH BOX */
    .search-box {
      margin-top: 1.5rem;
      background: #f5f7fb;
      border-radius: 12px;
      padding: 1rem;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
    .tab {
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .tab.active {
      background: #fff;
      border-color: #d1d5db;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.15);
    }

    .search-form {
      display: grid;
      grid-template-columns: 2.2fr 1.4fr 1.4fr 1.2fr auto;
      gap: 0.5rem;
    }
    .field {
      background: #fff;
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      border: 1px solid #e5e7eb;
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .field-label {
      font-size: 0.7rem;
      color: #6b7280;
    }
    .field-input input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 0.85rem;
    }
