<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan with TRoyGO™</title>

<style>
:root{
  --primary:#003b95;
  --bg:#f5f7fb;
  --border:#e5e7eb;
  --muted:#6b7280;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,Arial,sans-serif;
  background:var(--bg);
  color:#1b1b1b;
}

/* HEADER */
header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header strong{
  color:var(--primary);
  font-size:1.1rem;
}

/* HERO */
.hero{
  background:#fff;
  padding:2rem 1.5rem;
}
.hero h1{
  font-size:1.8rem;
  margin-bottom:.4rem;
}
.hero p{
  color:var(--muted);
  margin-bottom:1rem;
}

/* PLANNER */
.planner{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
  max-width:900px;
}
.input-row{
  display:flex;
  gap:.6rem;
}
.input-row input{
  flex:1;
  padding:.7rem .9rem;
  border:1px solid var(--border);
  border-radius:8px;
}
.input-row button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:.7rem 1.4rem;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* RESULTS */
#results{
  margin-top:1rem;
}
.day{
  margin-top:1.2rem;
  border-top:1px solid var(--border);
  padding-top:1rem;
}
.card{
  border:1px solid var(--border);
  border-radius:8px;
  padding:.6rem;
  margin:.4rem 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.card small{color:var(--muted)}
.card button{
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:.75rem;
  padding:.35rem .7rem;
  cursor:pointer;
}
.map{
  margin-top:.6rem;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}

footer{
  margin:3rem 0;
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <strong>TRoyGO™</strong>
  Trip Planner
</header>

<section class="hero">
  <h1>Plan with TRoyGO™</h1>
  <p>Attractions, food, experiences — organised day by day.</p>

  <div class="planner">
    <div class="input-row">
      <input id="query" placeholder="e.g. 4 days in Paris food and culture">
      <button onclick="planTrip()">Plan</button>
    </div>

    <!-- RESULTS APPEAR HERE -->
    <div id="results"></div>
  </div>
</section>

<footer>
© <span id="year"></span> TRoyGO™ / TRoy Travel Agency™
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* MAIN ENTRY */
function planTrip(){
  const input = document.getElementById("query");
  const output = document.getElementById("results");

  if(!input || !output){
    alert("Planner error: missing elements.");
    return;
  }

  const text = input.value.trim();
  if(!text){
    alert("Please type a trip idea.");
    return;
  }

  output.innerHTML = "<em>Planning your trip…</em>";

  setTimeout(() => {
    output.innerHTML = buildTrip(text);
  }, 400);
}

/* BUILD TRIP */
function buildTrip(query){
  const daysMatch = query.match(/(\\d+)/);
  const days = daysMatch ? parseInt(daysMatch[1]) : 5;

  let city = "Paris";
  ["Paris","Rome","Tokyo","Bangkok","Bali","Istanbul","Sydney","New York"]
    .forEach(c=>{
      if(query.toLowerCase().includes(c.toLowerCase())) city=c;
    });

  let html = `<h3>${city} – ${days} days</h3>`;

  for(let d=1; d<=days; d++){
    html += `
      <div class="day">
        <strong>Day ${d}</strong>

        ${card("🏛 Attraction","Top landmark","https://www.tripadvisor.com")}
        ${card("🍽 Food","Popular restaurant","https://www.tripadvisor.com")}
        ${card("🎟 Experience","Guided activity","https://www.getyourguide.com")}

        <div class="map">
          <iframe
            width="100%"
            height="200"
            loading="lazy"
            src="https://www.google.com/maps?q=${encodeURIComponent(city)}&output=n card(title, subtitle, link){
  return `
    <div class="card">
      <div>
        <div><strong>${title}</strong></div>
        <small>${subtitle}</small>
      </div>
      <button onclick="window.open('${link}','_blank')">View</button>
    </div>
  `;
}
</script>

</body>
</html>
