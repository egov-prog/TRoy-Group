<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plan with TRoyGO™</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f7fb;
  margin:0;
  color:#1b1b1b;
}
header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
}
header b{ color:#003b95; }

main{
  background:#fff;
  padding:30px 20px;
}
h1{ margin-top:0; }

.planner{
  max-width:900px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:16px;
}

input{
  width:70%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:10px 18px;
  margin-left:6px;
  background:#003b95;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.day{
  margin-top:20px;
  border-top:1px solid #e5e7eb;
  padding-top:15px;
}

.card{
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:10px;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
}

iframe{
  margin-top:8px;
  border:0;
  width:100%;
  height:200px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <b>TRoyGO™</b>
  Trip Planner
</header>

<main>
  <h1>Plan with TRoyGO™</h1>
  <p>Attractions, food, experiences — organised day by day.</p>

  <div class="planner">
    <input id="query" value="4 days in Paris food and culture">
    <button onclick="runPlanner()">Plan</button>

    <div id="results" style="margin-top:20px;"></div>
  </div>
</main>

<script>
function runPlanner(){

  // ✅ ABSOLUTE PROOF BUTTON WORKS
  var out = document.getElementById("results");
  out.innerHTML = "<b>✅ Button click detected. Building itinerary…</b>";

  var text = document.getElementById("query").value.toLowerCase();
  var days = 5;
  var city = "Paris";

  // extract days (simple + safe)
  for(var i=1;i<=14;i++){
    if(text.indexOf(i + " day") !== -1){
      days = i;
    }
  }

  if(text.indexOf("rome") !== -1) city="Rome";
  if(text.indexOf("tokyo") !== -1) city="Tokyo";
  if(text.indexOf("bangkok") !== -1) city="Bangkok";
  if(text.indexOf("bali") !== -1) city="Bali";

  var html = "<h3>" + city + " – " + days + " days</h3>";

  for(var d=1; d<=days; d++){
    html +=
      "<div class='day'>" +
        "<b>Day " + d + "</b>" +

        "<div class='card'>" +
          "<div>🏛 Attraction<br><small>Top landmark</small></div>" +
          "<button onclick=\"window.open('https://www.tripadvisor.com')\">View</button>" +
        "</div>" +

        "<div class='card'>" +
          "<div>🍽 Food<br><small>Popular restaurant</small></div>" +
          "<button onclick=\"window.open('https://www.tripadvisor.com')\">View</button>" +
        "</div>" +

        "<div class='card'>" +
          "<div>🎟 Experience<br><small>Guided activity</small></div>" +
          "<button onclick=\"window.open('https://www.getyourguide.com')\">View</button>" +
        "</div>" +

        "<iframe src='https://www.google.com/maps?q=" + city + "&output=
  out.innerHTML = html;
}
</script>

</body>
</html>
