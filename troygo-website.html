<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRoyGO™ Trip Planner</title>

<style>
:root{
  --primary:#003b95;
  --accent:#febb02;
  --bg:#f5f7fb;
  --text:#1b1b1b;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header strong{
  color:var(--primary);
  font-size:1.15rem;
}

/* HERO */
.hero{
  background:#fff;
  padding:2rem 1.5rem;
}
.hero h1{
  font-size:1.9rem;
  margin-bottom:.5rem;
}
.hero p{
  color:var(--muted);
  margin-bottom:1.2rem;
}

/* INPUT */
.planner-box{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
  max-width:900px;
}
.planner-input{
  display:flex;
  gap:.6rem;
}
.planner-input input{
  flex:1;
  padding:.7rem .9rem;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:.9rem;
}
.planner-input button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:.7rem 1.3rem;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* DAY */
.day{
  margin-top:1.2rem;
  border-top:1px solid var(--border);
  padding-top:1rem;
}
.day-title{
  font-weight:700;
  margin-bottom:.6rem;
}

/* CARD */
.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:.7rem;
  margin-bottom:.5rem;
}
.card small{color:var(--muted)}
.card button{
  background:var(--primary);
  color:#fff;
  border:none;
  font-size:.75rem;
  padding:.4rem .8rem;
  border-radius:6px;
  cursor:pointer;
}

/* MAP */
.map{
  margin-top:.6rem;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
}

/* FOOTER */
footer{
  margin:2.5rem 0;
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <strong>TRoyGO™</strong>
  Trip Planner
</header>

<section class="hero">
  <h1>Plan trips like TripAdvisor</h1>
  <p>Attractions, food, experiences — organised day by day.</p>

  <div class="planner-box">
    <div class="planner-input">
      <input id="query" placeholder="e.g. 5 days in Rome culture & food">
      <button onclick="planTrip()">Plan</button>
    </div>

    <div id="results" style="margin-top:1rem"></div>
  </div>
</section>

<footer>
© <span id="yr"></span> TRoyGO™ / TRoy Travel Agency™
</footer>

<script>
document.getElementById("yr").textContent = new Date().getFullYear();

/* MAIN PLANNER */
function planTrip(){
  const q=document.getElementById("query").value.trim();
  if(!q) return;

  saveQuery(q);
  renderPlan(buildTrip(q));
}

/* BUILD TRIP */
function buildTrip(query){
  const daysMatch=query.match(/(\\d+)/);
  const days=daysMatch?parseInt(daysMatch[1]):5;

  let city="Destination";
  ["Rome","Paris","Tokyo","Bangkok","Bali","Istanbul","Sydney","New York"]
    .forEach(c=>{
      if(query.toLowerCase().includes(c.toLowerCase())) city=c;
    });

  let html=`<strong style="font-size:1.1rem">${city} – ${days} days</strong>`;

  for(let d=1;d<=days;d++){
    html+=`
    <div class="day">
      <div class="day-title">Day ${d}</div>
      ${card("🏛 Attraction","Top landmark","https://www.tripadvisor.com")}
      ${card("🍽 Food","Famous local restaurant","https://www.tripadvisor.com")}
      ${card("🎟 Experience","Popular guided activity","https://www.getyourguide.com")}
      <div class="map">
        <iframe
          width="100%"
          height="200"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=${encodeURIComponent(city)}&output=embed <div>
      <div><strong>${title}</strong></div>
      <small>${desc}</small>
    </div>
    <button onclick="window.open('${link}','_blank')">View</button>
  </div>`;
}

/* RENDER */
function renderPlan(html){
  document.getElementById("results").innerHTML=html;
}

/* SAVE ITINERARIES */
function saveQuery(q){
  const saved=JSON.parse(localStorage.getItem("troygo_trips")||"[]");
  saved.unshift({q,date:new Date().toISOString()});
  localStorage.setItem("troygo_trips",JSON.stringify(saved.slice(0,10)));
}
</script>

</body>
</html>
