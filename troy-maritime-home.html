<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRoy Maritime Agency™ — Global Operations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #e6e6e6;
        }

        /* NAVBAR */
        nav {
            width: 100%;
            padding: 20px 40px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        nav .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00aaff;
            letter-spacing: 1px;
        }
        nav a {
            color: #e6e6e6;
            margin-left: 25px;
            text-decoration: none;
            font-size: 0.95rem;
        }
        nav a:hover {
            color: #00aaff;
        }

        /* HERO */
        .hero {
            padding: 120px 40px;
            background: linear-gradient(to bottom, #00111a, #000);
            text-align: left;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #00aaff;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 650px;
            line-height: 1.6;
            color: #cfcfcf;
        }
        .hero-buttons {
            margin-top: 35px;
        }
        .hero-btn {
            display: inline-block;
            padding: 14px 26px;
            margin-right: 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #00aaff;
            transition: 0.3s;
        }
        .hero-btn.primary {
            background: #00aaff;
            color: #000;
        }
        .hero-btn.primary:hover {
            background: transparent;
            color: #00aaff;
        }
        .hero-btn.secondary {
            background: transparent;
            color: #00aaff;
        }
        .hero-btn.secondary:hover {
            background: #00aaff;
            color: #000;
        }
        .hero-btn.tracker {
            background: #0077ff;
            border-color: #0077ff;
            color: #fff;
        }
        .hero-btn.tracker:hover {
            background: transparent;
            color: #0077ff;
        }
