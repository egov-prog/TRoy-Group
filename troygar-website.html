<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>TRoy GAR™ — The TRoy Garage™</title>
  <meta name="description" content="TRoy GAR™ — The TRoy Garage™ is the innovation lab of TRoy Group™, building experimental tools, AI prototypes and future technologies.">
  <style>
    :root {
      --primary: #0067b8;
      --primary-dark: #004e8f;
      --bg: #f5f5f5;
      --text: #1b1b1b;
      --muted: #6b7280;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    /* UNIFIED TRoy Group™ NAV BAR */
    .troy-nav {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .troy-nav-inner {
      max-width: 1200px;
      margin: auto;
      padding: 0.9rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .troy-brand-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .troy-brand-logo {
      width: 36px;
      height: 36px;
      background: #003b95;
      color: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .troy-brand-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #003b95;
    }
    .troy-menu {
      display: flex;
      gap: 1.4rem;
    }
    .troy-menu a {
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    .troy-menu a:hover {
      color: #0059d6;
    }
    @media (max-width: 700px) {
      .troy-nav-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }
      .troy-menu {
        flex-wrap: wrap;
        gap: 0.8rem;
      }
    }

    /* HERO */
    .hero {
      background: var(--primary);
      color: #fff;
      padding: 4rem 1.5rem;
    }
    .hero-inner {
      max-width: 1120px;
      margin: auto;
    }
    .hero h1 {
      font-size: clamp(2rem, 3vw, 2.8rem);
      margin-bottom: 0.5rem;
    }
    .hero p {
      max-width: 600px;
      opacity: 0.9;
    }
    .hero-btn {
      margin-top: 1.5rem;
      display: inline-block;
      background: #fff;
      color: var(--primary);
      padding: 0.7rem 1.4rem;
      border-radius: 6px;
      font-weight: 600;
    }

    /* SECTIONS */
    .section {
      max-width: 1120px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }
    .section h2 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .section-sub {
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
